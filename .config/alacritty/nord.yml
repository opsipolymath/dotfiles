# ${XDG_CONFIG_HOME}/alacritty/nord.yml
#
# Nord theme for alacritty

colors:
  primary:
    background:      '#2E3440'
    foreground:      '#ECEFF4'
    dim_foreground:  '#D8DEE9'
  cursor:
    text:    '#2E3440'
    cursor:  '#D8DEE9'
  vi_mode_cursor:
    text:    '#2E3440'
    cursor:  '#D8DEE9'
  selection:
    text:        CellForeground
    background:  '#4C566A'
  search:
    matches:
      foreground:  CellBackground
      background:  '#88C0D0'
    footer_bar:
      background:  '#434C5E'
      foreground:  '#D8DEE9'
  normal:
    black:    '#3B4252'
    red:      '#BF616A'
    green:    '#A3BE8C'
    yellow:   '#EBCB8B'
    blue:     '#81A1C1'
    magenta:  '#B48EAD'
    cyan:     '#88C0D0'
    white:    '#E5E9F0'
  bright:
    black:    '#4C566A'
    red:      '#BF616A'
    green:    '#A3BE8C'
    yellow:   '#EBCB8B'
    blue:     '#81A1C1'
    magenta:  '#B48EAD'
    cyan:     '#8FBCBB'
    white:    '#ECEFF4'
  dim:
    # Dim colors are faded versions not part of nord spec
    black:    '#373E4D'
    red:      '#94545D'
    green:    '#809575'
    yellow:   '#B29E75'
    blue:     '#68809A'
    magenta:  '#8C738C'
    cyan:     '#6D96A5'
    white:    '#AEB3BB'
